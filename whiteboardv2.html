<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Teacher Mikee's Classroom Whiteboard - Stable v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-red: #ffadad; --p-orange: #ffd6a5; --p-yellow: #fdffb6;
            --p-green: #caffbf; --p-blue: #9bf6ff; --p-purple: #bdb2ff;
            --p-pink: #ffc6ff; --ui-bg: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Balsamiq Sans', sans-serif;
            background: #e0e0e0; touch-action: none;
        }

        /* --- Header & UI --- */
        header {
            height: 65px; background: white; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 4px solid #ccc; z-index: 100;
        }
        .credits { font-size: 0.75rem; color: #777; line-height: 1.2; }
        .timer-group { display: flex; align-items: center; gap: 8px; }
        #timer-box { 
            font-size: 1.8rem; min-width: 85px; text-align: center;
            background: #fff; border: 3px solid var(--p-yellow); border-radius: 12px;
        }

        /* --- Board Container --- */
        #board-area {
            position: absolute; top: 65px; bottom: 95px; left: 0; right: 0;
            display: flex; background: #333; gap: 5px; padding: 5px; box-sizing: border-box;
        }
        .board-wrap {
            flex: 1; height: 100%; background: #fff; border-radius: 8px;
            position: relative; overflow: hidden;
        }
        #wrap-right { display: none; }
        canvas { 
            width: 100%; height: 100%; display: block; 
            touch-action: none; background: #fff;
        }

        /* --- Custom Modals --- */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .chibi-modal {
            background: white; padding: 40px; border-radius: 35px;
            border: 10px solid var(--p-purple); text-align: center;
            transform: scale(0.5); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chibi-modal.active { transform: scale(1); opacity: 1; }

        /* --- Countdown --- */
        #cd-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 500; font-size: 12rem; color: var(--p-blue);
        }

        /* --- Footer Controls --- */
        footer {
            position: absolute; bottom: 0; width: 100%; height: 95px;
            background: white; border-top: 4px solid #ccc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .palette { display: flex; gap: 10px; margin-bottom: 8px; }
        .color-btn {
            width: 30px; height: 30px; border-radius: 50%; border: 3px solid #eee;
            cursor: pointer; transition: 0.2s;
        }
        .color-btn.selected { transform: scale(1.3); border-color: #444; box-shadow: 0 0 8px rgba(0,0,0,0.3); }

        button {
            font-family: 'Balsamiq Sans', sans-serif; font-weight: bold;
            border: none; border-radius: 20px; cursor: pointer;
            transition: 0.1s; box-shadow: 0 5px 0 #999; padding: 10px 15px;
        }
        button:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 1px 0 #999; }
        button:disabled { filter: grayscale(1); opacity: 0.6; }

        .btn-blue { background: var(--p-blue); }
        .btn-green { background: var(--p-green); }
        .btn-pink { background: var(--p-pink); }
        .btn-yellow { background: var(--p-yellow); }
        .btn-purple { background: var(--p-purple); }
        .tool-on { outline: 4px solid #444; background: white !important; }
        
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; border: 1px solid #999; }
    </style>
</head>
<body>

<div id="modal-overlay"><div class="chibi-modal" id="modal-content"><h1 id="modal-text" style="font-size: 3.5rem; margin:0;"></h1></div></div>
<div id="cd-overlay">3</div>

<header>
    <div class="credits">Created by:<br><b>Mikee Gamboa "Teacher Mikee" (FET)</b></div>
    <div class="timer-group">
        <button class="btn-yellow" onclick="changeTimer(-5)">-</button>
        <div id="timer-box">00:30</div>
        <button class="btn-yellow" onclick="changeTimer(5)">+</button>
        <button class="btn-pink" onclick="resetSystem()">重置 (Reset)</button>
        <button class="btn-green" id="start-btn" onclick="triggerCountdown()">START!</button>
    </div>
    <button class="btn-purple" id="mode-btn" onclick="toggleDualMode()">Dual Mode</button>
</header>

<div id="board-area">
    <div class="board-wrap" id="wrap-left"><canvas id="leftBoard"></canvas></div>
    <div class="board-wrap" id="wrap-right"><canvas id="rightBoard"></canvas></div>
</div>

<footer>
    <div class="palette" id="color-bar"></div>
    <div style="display:flex; gap:12px;">
        <button class="btn-blue tool-on" id="pen-tool" onclick="selectTool('pen')"><span id="dot" class="indicator"></span>畫筆 (Pen)</button>
        <button class="btn-blue" id="erase-tool" onclick="selectTool('eraser')">橡皮擦 (Erase)</button>
        <button class="btn-yellow" id="s1" onclick="selectSize(4, 's1')">Thin</button>
        <button class="btn-yellow tool-on" id="s2" onclick="selectSize(10, 's2')">Medium</button>
        <button class="btn-yellow" id="s3" onclick="selectSize(22, 's3')">Thick</button>
        <button class="btn-pink" onclick="clearDrawings()">清除 (Clear)</button>
    </div>
</footer>

<script>
    const state = {
        canvases: [document.getElementById('leftBoard'), document.getElementById('rightBoard')],
        ctxs: [],
        drawing: new Map(), // Tracks multiple pointers across both canvases
        isDual: false,
        writable: true,
        tool: 'pen',
        color: '#000000',
        size: 10,
        timeLeft: 30,
        interval: null
    };

    function init() {
        state.ctxs = state.canvases.map(c => c.getContext('2d', { desynchronized: true }));
        window.addEventListener('resize', handleResize);
        
        // Setup Color Palette
        const colors = ['#000000', '#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff924c'];
        const bar = document.getElementById('color-bar');
        colors.forEach((c, i) => {
            const btn = document.createElement('div');
            btn.className = `color-btn ${i===0?'selected':''}`;
            btn.style.background = c;
            btn.onclick = () => {
                state.color = c;
                state.tool = 'pen';
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updateUI();
                beep(600, 0.05);
            };
            bar.appendChild(btn);
        });

        // Independent Event Listeners
        state.canvases.forEach((canvas, idx) => {
            canvas.addEventListener('pointerdown', (e) => onDown(e, idx));
            canvas.addEventListener('pointermove', onMove);
            canvas.addEventListener('pointerup', onUp);
            canvas.addEventListener('pointerleave', onUp);
        });

        handleResize();
        updateUI();
    }

    function fillWhite(ctx) {
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    }

    function handleResize() {
        state.canvases.forEach((c, i) => {
            // Preservation of drawing is not required on simple whiteboard resize
            // but we must set width/height based on offset to avoid coordinate bugs
            c.width = c.offsetWidth;
            c.height = c.offsetHeight;
            fillWhite(state.ctxs[i]);
            state.ctxs[i].lineCap = 'round';
            state.ctxs[i].lineJoin = 'round';
        });
    }

    function onDown(e, idx) {
        if (!state.writable) return;
        e.preventDefault();
        const rect = state.canvases[idx].getBoundingClientRect();
        state.drawing.set(e.pointerId, {
            ctx: state.ctxs[idx],
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        });
        beep(400, 0.02);
    }

    function onMove(e) {
        if (!state.drawing.has(e.pointerId)) return;
        const data = state.drawing.get(e.pointerId);
        const rect = data.ctx.canvas.getBoundingClientRect();
        const nx = e.clientX - rect.left;
        const ny = e.clientY - rect.top;

        data.ctx.beginPath();
        data.ctx.strokeStyle = state.tool === 'eraser' ? '#FFFFFF' : state.color;
        data.ctx.lineWidth = state.size;
        data.ctx.moveTo(data.x, data.y);
        data.ctx.lineTo(nx, ny);
        data.ctx.stroke();

        data.x = nx; data.y = ny;
    }

    function onUp(e) { state.drawing.delete(e.pointerId); }

    // --- UX Functions ---
    function popup(msg, time = 1500) {
        const ov = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-text').innerText = msg;
        ov.style.display = 'flex';
        setTimeout(() => content.classList.add('active'), 10);
        setTimeout(() => {
            content.classList.remove('active');
            setTimeout(() => ov.style.display = 'none', 300);
        }, time);
    }

    function updateUI() {
        document.getElementById('dot').style.background = state.color;
        document.getElementById('pen-tool').classList.toggle('tool-on', state.tool === 'pen');
        document.getElementById('erase-tool').classList.toggle('tool-on', state.tool === 'eraser');
    }

    function selectTool(t) { state.tool = t; updateUI(); beep(500, 0.05); }

    function selectSize(s, id) {
        state.size = s;
        ['s1','s2','s3'].forEach(i => document.getElementById(i).classList.remove('tool-on'));
        document.getElementById(id).classList.add('tool-on');
        beep(550, 0.05);
    }

    function toggleDualMode() {
        state.isDual = !state.isDual;
        document.getElementById('wrap-right').style.display = state.isDual ? 'block' : 'none';
        document.getElementById('mode-btn').innerText = state.isDual ? "Singular Mode" : "Dual Mode";
        handleResize(); // Crucial to initialize second canvas
        beep(800, 0.1);
    }

    function clearDrawings() {
        state.ctxs.forEach(ctx => {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            fillWhite(ctx);
        });
        popup("清除完成! (Cleared!)");
        beep(200, 0.2);
    }

    // --- Timer System ---
    function changeTimer(v) {
        state.timeLeft = Math.max(5, state.timeLeft + v);
        document.getElementById('timer-box').innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;
    }

    function triggerCountdown() {
        state.writable = false;
        document.getElementById('start-btn').disabled = true;
        const screen = document.getElementById('cd-overlay');
        screen.style.display = 'flex';
        let c = 3;
        screen.innerText = c;
        
        const timer = setInterval(() => {
            c--;
            if (c > 0) {
                screen.innerText = c;
                beep(400, 0.1);
            } else if (c === 0) {
                screen.innerText = "GO!";
                beep(1000, 0.2);
            } else {
                clearInterval(timer);
                screen.style.display = 'none';
                beginGame();
            }
        }, 1000);
    }

    function beginGame() {
        state.writable = true;
        state.interval = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-box').innerText = `00:${state.timeLeft.toString().padStart(2, '0')}`;
            if (state.timeLeft <= 0) {
                clearInterval(state.interval);
                state.writable = false;
                document.getElementById('pen-tool').disabled = true;
                popup("時間到! (Time's Up!)", 3000);
                beep(150, 0.6);
            }
        }, 1000);
    }

    function resetSystem() {
        clearInterval(state.interval);
        state.timeLeft = 30;
        state.writable = true;
        document.getElementById('timer-box').innerText = "00:30";
        document.getElementById('start-btn').disabled = false;
        document.getElementById('pen-tool').disabled = false;
        popup("已重置! (Reset)");
    }

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d) {
        const o = audio.createOscillator();
        const g = audio.createGain();
        o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime + d);
    }

    init();
</script>
</body>
</html>
